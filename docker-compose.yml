version: "3.9"

services:
  auth-service:
    build:
      context: ./backend/services/auth
    container_name: auth-service
    ports:
      - "8000:8000"
    volumes:
      - ./backend/services/auth:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend/web
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/web:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - auth-service
