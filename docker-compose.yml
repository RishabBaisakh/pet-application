version: "3.9"

services:
  db:
    image: postgres:15
    container_name: pet-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  auth-service:
    build:
      context: ./backend/services/auth
    container_name: auth-service
    ports:
      - "8000:8000"
    volumes:
      - ./backend/services/auth:/app
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend/web
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - auth-service

volumes:
  postgres_data:
